# This file contains non-secret configuration for all RASS services.
# It should be committed to version control.
# Secret values (API keys, passwords) belong in .env — never here.
#
# Field types and allowed values are documented inline below.
# All services validate this file on startup and will exit with a descriptive
# error message if a required field is missing or has an invalid value.

# --- Global Settings ---
# type: string — hostname of the OpenSearch container (Docker service name or IP)
OPENSEARCH_HOST: "opensearch"
# type: integer — OpenSearch HTTP port
OPENSEARCH_PORT: 9200
# type: string — name of the OpenSearch index used for vector storage
OPENSEARCH_INDEX_NAME: "knowledge_base"

# --- Redis Configuration ---
# type: string — hostname of the Redis container
REDIS_HOST: "redis"
# type: integer — Redis port
REDIS_PORT: 6379
# type: integer — Redis database number (0-15)
REDIS_DB: 0

# --- Provider Choices ---
# type: enum["openai", "gemini"] — which provider to use for document embeddings
EMBEDDING_PROVIDER: "gemini"
# type: enum["openai", "gemini"] — which provider to use for LLM answer generation
LLM_PROVIDER: "gemini"
# type: enum["openai", "gemini"] — which provider to use for query-term embeddings at retrieval time
SEARCH_TERM_EMBEDDING_PROVIDER: "gemini"

# --- Model Names ---
# Embedding Models
# type: string — OpenAI embedding model name (used when EMBEDDING_PROVIDER="openai")
OPENAI_EMBED_MODEL_NAME: "text-embedding-3-large"
# type: string — Google Gemini embedding model name (used when EMBEDDING_PROVIDER="gemini")
GEMINI_EMBED_MODEL_NAME: "gemini-embedding-001"
# LLM (Generator) Models
# type: string — OpenAI chat model name (used when LLM_PROVIDER="openai")
OPENAI_MODEL_NAME: "gpt-4.1-nano"
# type: string — Google Gemini chat model name (used when LLM_PROVIDER="gemini")
GEMINI_MODEL_NAME: "gemini-2.5-flash"
# Reranker Model
# type: string — cross-encoder model for reranking (future Phase B feature)
RERANKER_MODEL_NAME: "cross-encoder/ms-marco-MiniLM-L6-v2"

# --- Service Ports ---
# type: integer — port the embedding-service listens on
EMBEDDING_SERVICE_PORT: 8001
# type: integer — port the rass-engine-service listens on
RASS_ENGINE_PORT: 8000
# type: integer — port the mcp-server listens on (also used for the frontend proxy)
MCP_SERVER_PORT: 8080
# type: integer — port the reranker service listens on (future Phase B feature)
RERANKER_PORT: 8008

# --- RAG Parameters ---
# For Small-to-Big Retrieval (parent/child chunking strategy)
# type: string — chunking strategy: fixed_size | recursive_character | sentence_window
CHUNKING_STRATEGY: "recursive_character"
# type: integer — maximum character size of parent chunks stored in Redis
PARENT_CHUNK_SIZE: 2000
# type: integer — character overlap between adjacent parent chunks (must be < PARENT_CHUNK_SIZE)
PARENT_CHUNK_OVERLAP: 500
# type: integer — maximum character size of child chunks indexed in OpenSearch
CHILD_CHUNK_SIZE: 500
# type: integer — character overlap between adjacent child chunks (must be < CHILD_CHUNK_SIZE)
CHILD_CHUNK_OVERLAP: 150
# type: integer — number of candidate chunks to retrieve per OpenSearch KNN query
DEFAULT_K_OPENSEARCH_HITS: 112
# type: integer — embedding vector dimension; must match the chosen embedding model output
#   OpenAI text-embedding-3-large → 3072 (or 1536 with truncation)
#   Google text-embedding-004     → 768
EMBED_DIM: 3072

# Search score thresholds
# type: float — minimum OpenSearch score; results below this are discarded
OPENSEARCH_SCORE_THRESHOLD: 0.1

# --- Phase C: Reranking Configuration ---
# type: enum["none", "cohere", "local"] — reranking provider (default: none)
# Set COHERE_API_KEY in .env when using "cohere".
# Set RERANKER_URL or RERANKER_PORT when using "local" (local Python cross-encoder service).
RERANK_PROVIDER: "cohere"
# type: integer — number of documents to keep after reranking
RERANK_TOP_N: 10
# type: string — Cohere rerank model name (only used when RERANK_PROVIDER=cohere)
COHERE_RERANK_MODEL: "rerank-english-v3.0"

# --- Phase C: HyDE (Hypothetical Document Embeddings) Configuration ---
# type: boolean — enable HyDE query expansion (opt-in; adds one extra LLM call per query)
HYDE_ENABLED: true
# type: integer — max tokens for the hypothetical document generated by HyDE
HYDE_MAX_TOKENS: 200

search:
  # type: integer — maximum number of source documents passed to the LLM for generation
  DEFAULT_TOP_K: 10

# ─── Phase G: Adaptive Retrieval Feedback (Issue #134) ───────────────────────
# type: boolean — Enable personalized feedback-based score boosting in retrieval
FEEDBACK_BOOST_ENABLED: true

# ─── Phase G: Ollama Local Model Support (Issue #135) ────────────────────────
# To use Ollama instead of OpenAI or Gemini:
#   1. Set EMBEDDING_PROVIDER: ollama and/or LLM_PROVIDER: ollama
#   2. Ensure the Ollama container is running (docker compose up ollama)
#   3. Run: bash scripts/ollama-pull-models.sh to pull the required models
#
# type: string — Ollama server base URL
OLLAMA_BASE_URL: "http://ollama:11434"
# type: string — Ollama model for LLM generation (e.g. llama3.2, mistral, gemma2)
OLLAMA_LLM_MODEL: "llama3.2"
# type: string — Ollama model for embeddings (e.g. nomic-embed-text, mxbai-embed-large)
OLLAMA_EMBED_MODEL: "nomic-embed-text"

# ─── Phase G: Multi-modal Document Understanding (Issue #136) ─────────────────
# type: boolean — Enable OCR for scanned PDFs and image files (requires tesseract.js)
VISION_ENABLED: false

# --- LLM Generation Limits ---
# type: integer — maximum number of tokens the LLM may generate per response.
# Increase for detailed answers; lower for faster, shorter responses.
LLM_MAX_TOKENS: 8192

# ─── Phase 1 Enhancement: Conversational Query Reformulation ─────────────────
# type: boolean — Enable LLM-based query reformulation using conversation history
QUERY_REFORMULATION_ENABLED: true

# ─── Phase 3: Contextual Retrieval (Anthropic method) ────────────────────────
# type: boolean — prepend LLM-generated context prefix to each child chunk at ingestion
# Dramatically reduces retrieval failures (~49–67% fewer per Anthropic research).
# Requires re-indexing all documents after enabling.
CONTEXTUAL_RETRIEVAL_ENABLED: false
# type: enum["openai", "gemini", "ollama"] — cheap model for context prefix generation
CONTEXTUAL_RETRIEVAL_PROVIDER: "gemini"

# ─── Phase 6: LightRAG Graph Layer ───────────────────────────────────────────
# type: boolean — extract entities/relations during ingestion (requires re-index)
GRAPH_EXTRACTION_ENABLED: false
# type: boolean — expand retrieval via entity graph (requires GRAPH_EXTRACTION_ENABLED first)
GRAPH_EXPANSION_ENABLED: false

# ─── Phase 7: Web Search Fallback (CRAG-lite) ────────────────────────────────
# type: boolean — fall back to web search when top retrieved chunk relevance is low
WEB_SEARCH_ENABLED: false
# type: string — provider: "tavily" or "brave"
WEB_SEARCH_PROVIDER: "tavily"
# type: float — trigger web search if top chunk score is below this threshold
WEB_SEARCH_THRESHOLD: 0.3
