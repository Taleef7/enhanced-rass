# config.example.yml — Reference template for RASS service configuration.
#
# Copy this file to config.yml and fill in values appropriate for your environment.
# All services (embedding-service, rass-engine-service, mcp-server) read config.yml
# at startup and validate it using Zod schemas. Missing or invalid values will
# cause the service to print a descriptive error and exit before binding a port.
#
# Secret values (API keys, passwords, JWT secrets) belong in .env — NEVER in this file.

# ---------------------------------------------------------------------------
# Provider Choices
# ---------------------------------------------------------------------------
# type: enum["openai", "gemini"] — provider for document embeddings
EMBEDDING_PROVIDER: "ollama"

# type: enum["openai", "gemini"] — provider for LLM answer generation
LLM_PROVIDER: "ollama"

# type: enum["openai", "gemini"] — provider for query-term embeddings at retrieval time
SEARCH_TERM_EMBEDDING_PROVIDER: "ollama"

# ---------------------------------------------------------------------------
# Model Names
# ---------------------------------------------------------------------------
# Embedding models — the active model is determined by EMBEDDING_PROVIDER
# type: string — OpenAI embedding model (used when EMBEDDING_PROVIDER="openai")
OPENAI_EMBED_MODEL_NAME: "text-embedding-3-large"

# type: string — Google Gemini embedding model (used when EMBEDDING_PROVIDER="gemini")
GEMINI_EMBED_MODEL_NAME: "gemini-embedding-001"
OLLAMA_EMBED_MODEL: "nomic-embed-text"

# LLM (generator) models — the active model is determined by LLM_PROVIDER
# type: string — OpenAI chat model (used when LLM_PROVIDER="openai")
OPENAI_MODEL_NAME: "gpt-4.1-nano"

# type: string — Google Gemini chat model (used when LLM_PROVIDER="gemini")
GEMINI_MODEL_NAME: "gemini-2.5-flash"
OLLAMA_LLM_MODEL: "llama3.2"

# Reranker (future Phase B feature)
# type: string — cross-encoder model for reranking retrieved documents
RERANKER_MODEL_NAME: "cross-encoder/ms-marco-MiniLM-L6-v2"

# ---------------------------------------------------------------------------
# OpenSearch Configuration
# ---------------------------------------------------------------------------
# type: string, min length 1 — hostname of the OpenSearch container
OPENSEARCH_HOST: "opensearch"

# type: integer, 1–65535 — OpenSearch HTTP port
OPENSEARCH_PORT: 9200

# type: string, min length 1 — name of the OpenSearch vector index
OPENSEARCH_INDEX_NAME: "knowledge_base"

# ---------------------------------------------------------------------------
# Redis Configuration
# ---------------------------------------------------------------------------
# type: string, min length 1 — hostname of the Redis container
REDIS_HOST: "redis"

# type: integer, 1–65535 — Redis port
REDIS_PORT: 6379

# type: integer, >= 0 — Redis database number (0–15)
REDIS_DB: 0

# ---------------------------------------------------------------------------
# Service Ports
# type: integer, 1024–65535 — ports each service listens on
# ---------------------------------------------------------------------------
EMBEDDING_SERVICE_PORT: 8001
RASS_ENGINE_PORT: 8000
MCP_SERVER_PORT: 8080
RERANKER_PORT: 8008

# ---------------------------------------------------------------------------
# RAG Parameters
# ---------------------------------------------------------------------------
# type: integer, positive — embedding vector dimension
#   OpenAI text-embedding-3-large → 3072  (or 1536 with truncation)
#   Google text-embedding-004     → 768
EMBED_DIM: 768
OLLAMA_BASE_URL: "http://ollama:11434"

# Small-to-Big Retrieval chunking strategy (parent/child)
# type: integer, positive — max characters per parent chunk stored in Redis
PARENT_CHUNK_SIZE: 2000

# type: integer, 0 to <PARENT_CHUNK_SIZE — overlap between adjacent parent chunks
PARENT_CHUNK_OVERLAP: 500

# type: integer, positive — max characters per child chunk indexed in OpenSearch
CHILD_CHUNK_SIZE: 500

# type: integer, 0 to <CHILD_CHUNK_SIZE — overlap between adjacent child chunks
CHILD_CHUNK_OVERLAP: 150

# type: integer, positive — number of candidate chunks retrieved per KNN query
DEFAULT_K_OPENSEARCH_HITS: 112

# type: float, 0.0–1.0 — minimum OpenSearch relevance score; results below this are discarded
OPENSEARCH_SCORE_THRESHOLD: 0.1

search:
  # type: integer, positive — maximum source documents passed to the LLM for generation
  DEFAULT_TOP_K: 10

# --- LLM Generation Limits ---
# type: integer — maximum number of tokens the LLM may generate per response.
LLM_MAX_TOKENS: 8192

# ─── Reranking (Phase 1) ─────────────────────────────────────────────────────
# type: enum["none", "cohere", "local"] — reranking provider (set COHERE_API_KEY in .env)
RERANK_PROVIDER: "none"
# type: integer — number of documents to keep after reranking (should match DEFAULT_TOP_K)
RERANK_TOP_N: 10

# ─── HyDE (Phase 1) ──────────────────────────────────────────────────────────
# type: boolean — enable HyDE query expansion (adds one LLM call per query)
HYDE_ENABLED: true
# type: integer — max tokens for the hypothetical document
HYDE_MAX_TOKENS: 200

# ─── Conversational Query Reformulation (Phase 2) ───────────────────────────
# type: boolean — enable LLM-based query reformulation using conversation history
QUERY_REFORMULATION_ENABLED: true

# ─── Contextual Retrieval (Phase 3) ──────────────────────────────────────────
# type: boolean — prepend LLM-generated context prefix to each child chunk
# NOTE: Requires re-indexing all documents after enabling.
CONTEXTUAL_RETRIEVAL_ENABLED: false
# type: enum["openai", "gemini", "ollama"] — cheap model for context prefix generation
CONTEXTUAL_RETRIEVAL_PROVIDER: "gemini"

# ─── LightRAG Graph Layer (Phase 6) ──────────────────────────────────────────
GRAPH_EXTRACTION_ENABLED: false
GRAPH_EXPANSION_ENABLED: false

# ─── Web Search Fallback (Phase 7) ───────────────────────────────────────────
WEB_SEARCH_ENABLED: false
WEB_SEARCH_PROVIDER: "tavily"
WEB_SEARCH_THRESHOLD: 0.3
