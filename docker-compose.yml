version: '3.8'

# Defines a reusable configuration block for environment variables
# This will be used by services that need access to the config file values
x-environment:
  # Secrets are loaded from the root .env file by Docker Compose automatically
  &default-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  # Non-secret configs are now read from the mounted config.yml
  # The services will need to be updated to read these from env vars
  # which we will populate below.

services:
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch_node
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx1g  # Reduced memory allocation
      - bootstrap.memory_lock=false  # Disable memory lock to prevent issues
      - "DISABLE_SECURITY_PLUGIN=true"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "cluster.routing.allocation.disk.threshold_enabled=false"  # Disable disk checks for dev
      - "logger.level=WARN"  # Reduce logging to prevent memory issues
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - rass_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -sS -k http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s  # Increased interval to reduce load
      timeout: 10s
      retries: 10
      start_period: 60s  # Give more time for startup
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G  # Set container memory limit
        reservations:
          memory: 512M

  redis:
    image: redis:7.2-alpine
    container_name: redis_node
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rass_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec

  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: embedding_service_app
    ports:
      - "8001:8001"
    volumes:
      - ./embedding-service/uploads:/usr/src/app/embedding-service/uploads
      - ./config.yml:/usr/src/app/embedding-service/config.yml:ro # Mount config read-only
    # The 'env_file' is now removed. Environment is handled below.
    environment:
      <<: *default-env # Inherit secrets
      # We will add non-secret vars from config.yml here in the next step
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: embedding-service
      OTEL_ENABLED: "true"
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - rass_network
    restart: unless-stopped

  rass-engine-service:
    build:
      context: ./rass-engine-service
      dockerfile: Dockerfile
    container_name: rass_engine_app
    ports:
      - "8000:8000"
    volumes:
      - ./config.yml:/usr/src/app/rass-engine-service/config.yml:ro # Mount config read-only
    # The 'env_file' is now removed.
    environment:
      <<: *default-env # Inherit secrets
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: rass-engine-service
      OTEL_ENABLED: "true"
    depends_on:
      opensearch:
        condition: service_healthy
      jaeger:
        condition: service_started
    links:
      # <-- ADD THIS SECTION
      - opensearch:opensearch_node # <-- ADD THIS LINE
    networks:
      - rass_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp_server_app
    ports:
      - "8080:8080"
    volumes:
      - ./embedding-service/uploads:/usr/src/app/uploads:ro
      - ./config.yml:/usr/src/app/mcp-server/config.yml:ro
    # No environment variables needed for this service currently
    networks:
      - rass_network
    depends_on:
      rass-engine-service:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_DEFAULT_TOP_K=50
      - DATABASE_URL=postgresql://rass_user:rass_password@db:5432/rass_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=mcp-server
      - OTEL_ENABLED=true

  db:
    image: postgres:15
    container_name: postgres_db_node # I've given it a specific name
    restart: always
    environment:
      POSTGRES_USER: rass_user
      POSTGRES_PASSWORD: rass_password
      POSTGRES_DB: rass_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rass_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rass_user -d rass_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Phase E: Distributed Tracing (Jaeger) ────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - rass_network
    restart: unless-stopped

  # ── Phase E: Metrics Collection (Prometheus) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - rass_network
    restart: unless-stopped

  # ── Phase E: Metrics Dashboard (Grafana) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3001:3000"  # 3001 on host to avoid conflict with frontend dev server
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - rass_network
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ── Phase E: Log Aggregation (Loki) ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - rass_network
    restart: unless-stopped

  # ── Phase E: Log Shipper (Promtail) ──────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - rass_network
    depends_on:
      - loki
    restart: unless-stopped


  # ── Phase 5: OpenWebUI — OpenAI-compatible chat frontend ─────────────────────
  # Connects to mcp-server's /v1 endpoint for model discovery and completions.
  # Access the UI at http://localhost:3000
  #
  # First-run setup:
  #   1. Open http://localhost:3000 and register the first account (auto-promoted to admin).
  #   2. The "CoRAG" model is pre-selected via DEFAULT_MODELS below.
  #   3. To add per-user OpenAI/Gemini keys: Settings → Account → API Keys (stored
  #      encrypted in CoRAG via PUT /api/llm-keys/:provider).
  #   4. To adjust sources retrieved per query: in a chat session click the gear icon
  #      (⚙) → Advanced Parameters → Top K.
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      # ── Backend connection ────────────────────────────────────────────────────
      # Point OpenWebUI at RASS's OpenAI-compatible adapter
      - OPENAI_API_BASE_URL=http://mcp-server:8080/v1
      - OPENAI_API_KEY=corag-internal-key

      # ── UI pre-configuration (Phase 5.4) ─────────────────────────────────────
      # Show "CoRAG" in the title bar
      - WEBUI_NAME=CoRAG
      # Pre-select the base RASS model so users don't see a blank model picker
      - DEFAULT_MODELS=rass
      # Suggested starter prompts shown on the empty chat screen
      - DEFAULT_PROMPT_SUGGESTIONS=[{"title":"Summarise a document","content":"Please summarise the key points of [document name]."},{"title":"Compare two topics","content":"What are the main differences between [topic A] and [topic B] based on the knowledge base?"},{"title":"Find evidence","content":"What evidence does the knowledge base contain about [topic]?"},{"title":"Follow-up questions","content":"What questions should I ask to learn more about [topic]?"}]
      # Disable sign-up after the first admin account is created (set to false to allow open registration)
      - ENABLE_SIGNUP=true

      # ── Disable features that overlap with RASS ───────────────────────────────
      # Disable OpenWebUI's built-in RAG (RASS handles all retrieval)
      - ENABLE_RAG_WEB_SEARCH=false
      - RAG_EMBEDDING_ENGINE=
      # Disable community sharing to keep installation private
      - ENABLE_COMMUNITY_SHARING=false
      # Disable direct Ollama connection — RASS exposes rass-local model instead
      - ENABLE_OLLAMA_API=false
      # Disable image generation (not applicable)
      - ENABLE_IMAGE_GENERATION=false

      # ── Storage ───────────────────────────────────────────────────────────────
      - DATA_DIR=/app/backend/data
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - mcp-server
    networks:
      - rass_network
    restart: unless-stopped

  # ── Phase G #135: Ollama (local LLM + embedding — fully offline) ──────────────
  # Set EMBEDDING_PROVIDER: ollama and LLM_PROVIDER: ollama in config.yml to use.
  # GPU support: uncomment the `deploy` section below if you have NVIDIA drivers.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - rass_network
    restart: unless-stopped
    # Uncomment to enable NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  rass_network:
    name: shared_rass_network
    external: true

volumes:
  opensearch-data:
    driver: local
  redis-data:
    driver: local
  postgres_data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  ollama-models:
    driver: local
  openwebui-data:
    driver: local
