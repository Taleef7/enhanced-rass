openapi: "3.1.0"
info:
  title: RASS (Retrieval-Augmented Semantic Search) API
  version: "1.0.0"
  description: |
    Production-grade multi-service RAG system with document ingestion, hybrid retrieval,
    SSE streaming, multi-tenant workspaces, RBAC, audit logging, and API key authentication.

    ## Authentication
    Most endpoints require a Bearer JWT token from POST /api/auth/login.
    Machine-to-machine clients may use an API key via the Authorization header
    with the format `ApiKey <raw_key>`.

    ## SSE Streaming
    POST /api/stream-ask returns Server-Sent Events. See docs/api/streaming.md.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
  - name: Chats
  - name: Documents
  - name: Ingestion
  - name: Search
  - name: Knowledge Bases
  - name: Workspaces
  - name: Admin
  - name: API Keys
  - name: Health

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        createdAt:
          type: string
          format: date-time

    RegisteredUserResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
          description: Short-lived JWT. The frontend keeps it in memory.
      required: [message, token]

    RefreshResponse:
      type: object
      properties:
        token:
          type: string
      required: [token]

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    Chat:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chatId:
          type: string
          format: uuid
        sender:
          type: string
          enum: [user, bot]
        text:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        createdAt:
          type: string
          format: date-time

    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        originalFilename:
          type: string
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
        status:
          type: string
          enum: [QUEUED, PROCESSING, READY, FAILED, DELETED]
        chunkCount:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        openSearchIndex:
          type: string
        kbId:
          type: string
          format: uuid
          nullable: true
        uploadedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true

    DocumentProvenance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        sha256:
          type: string
        chunkingStrategy:
          type: string
          enum: [fixed_size, recursive_character, sentence_window]
        embeddingModel:
          type: string
        embedDim:
          type: integer
        pageCount:
          type: integer
          nullable: true
        parentChunkCount:
          type: integer
        childChunkCount:
          type: integer
        parseDurationMs:
          type: integer
        chunkDurationMs:
          type: integer
        embedDurationMs:
          type: integer
        indexDurationMs:
          type: integer
        createdAt:
          type: string
          format: date-time

    Citation:
      type: object
      properties:
        index:
          type: integer
        documentName:
          type: string
        documentId:
          type: string
          format: uuid
          nullable: true
        pageNumber:
          type: integer
          nullable: true
        excerpt:
          type: string
        relevanceScore:
          type: number
          format: float
        rerankScore:
          type: number
          format: float
          nullable: true
        grounded:
          type: boolean
      required: [index, documentName, excerpt]

    KnowledgeBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
          format: uuid
        openSearchIndex:
          type: string
        createdAt:
          type: string
          format: date-time

    KnowledgeGraphNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        chunkCount:
          type: integer
      required: [id, label, chunkCount]

    KnowledgeGraphEdge:
      type: object
      properties:
        source:
          type: string
          format: uuid
        target:
          type: string
          format: uuid
        weight:
          type: number
          format: float
      required: [source, target, weight]

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        orgId:
          type: string
          format: uuid
        openSearchIndex:
          type: string
        retentionDays:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
          nullable: true
        outcome:
          type: string
          enum: [SUCCESS, DENIED, ERROR]
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    IngestJobStatus:
      type: object
      properties:
        jobId:
          type: string
        documentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [waiting, active, completed, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        stage:
          type: string
          enum: [Queued, Parsing, Chunking, Embedding, Indexing, Ready, Failed]
        errorMessage:
          type: string
          nullable: true

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  example: alice
                password:
                  type: string
                  minLength: 8
              required: [username, password]
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisteredUserResponse"
        "400":
          description: Invalid input or duplicate username
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive JWT + HTTP-only refresh token cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: alice
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Silently refresh access token using HTTP-only cookie
      description: |
        Requires the refreshToken HTTP-only cookie set at login.
        Returns a new JWT; the refresh token is rotated (one-time use).
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Missing or expired refresh token

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current refresh token cookie
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /api/chats:
    post:
      tags: [Chats]
      summary: Create a new chat session
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "Research on Metformin"
              required: [title]
      responses:
        "201":
          description: Chat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
    get:
      tags: [Chats]
      summary: List all chats for the current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"

  /api/chats/{chatId}:
    get:
      tags: [Chats]
      summary: Get a chat session with messages
      security:
        - BearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chat with messages
        "404":
          description: Not found
    delete:
      tags: [Chats]
      summary: Delete a chat session
      security:
        - BearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chat deleted
    patch:
      tags: [Chats]
      summary: Update chat title
      security:
        - BearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
              required: [title]
      responses:
        "200":
          description: Chat updated

  /api/chats/{chatId}/messages:
    post:
      tags: [Chats]
      summary: Append a message to a chat
      security:
        - BearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sender:
                  type: string
                  enum: [user, bot]
                text:
                  type: string
                sources:
                  type: array
                  items:
                    $ref: "#/components/schemas/Citation"
              required: [sender, text]
      responses:
        "201":
          description: Message saved

  /api/embed-upload:
    post:
      tags: [Ingestion]
      summary: Upload a document for async ingestion (returns 202 immediately)
      description: |
        Enqueues the file in BullMQ. Processing pipeline:
        Parse -> Chunk -> Embed -> Index (OpenSearch + Redis).
        Supported formats: PDF, DOCX, TXT, MD.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                kbId:
                  type: string
                  format: uuid
                chunkingStrategy:
                  type: string
                  enum: [fixed_size, recursive_character, sentence_window]
              required: [file]
      responses:
        "202":
          description: File accepted for ingestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  documentId:
                    type: string
                    format: uuid
                  message:
                    type: string
        "400":
          description: Invalid file

  /api/ingest/status/{jobId}:
    get:
      tags: [Ingestion]
      summary: Poll ingestion job status and progress
      security:
        - BearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobStatus"
        "404":
          description: Job not found

  /api/stream-ask:
    post:
      tags: [Search]
      summary: Ask a question via SSE streaming
      description: |
        Performs hybrid retrieval then streams the answer as Server-Sent Events.

        SSE event types:
        - token: incremental answer text
        - citations: structured citation objects
        - context: retrieved chunks for transparency panel
        - done: stream complete
        - error: stream error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  example: "What are the contraindications for metformin?"
                chatId:
                  type: string
                  format: uuid
                kbId:
                  type: string
                  format: uuid
                workspaceId:
                  type: string
                  format: uuid
                top_k:
                  type: integer
                  default: 5
              required: [query]
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/chat/completions:
    post:
      tags: [Search]
      summary: OpenAI-compatible chat completions (streaming)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                stream:
                  type: boolean
                  default: true
              required: [messages]
      responses:
        "200":
          description: OpenAI-compatible SSE stream

  /api/transcribe:
    post:
      tags: [Ingestion]
      summary: Transcribe an audio recording to text
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
              required: [audio]
      responses:
        "200":
          description: Transcript
          content:
            application/json:
              schema:
                type: object
                properties:
                  transcript:
                    type: string

  /api/documents:
    get:
      tags: [Documents]
      summary: List current user documents (paginated)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [QUEUED, PROCESSING, READY, FAILED, DELETED]
      responses:
        "200":
          description: Paginated documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  pagination:
                    type: object

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: Get document metadata
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      tags: [Documents]
      summary: Delete document (removes vectors, marks DELETED)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document deleted
        "404":
          description: Not found

  /api/documents/{id}/provenance:
    get:
      tags: [Documents]
      summary: Get document ETL provenance record
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provenance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentProvenance"
        "404":
          description: Not found

  /api/knowledge-bases:
    post:
      tags: [Knowledge Bases]
      summary: Create a knowledge base (provisions OpenSearch index)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: "Medical Guidelines KB"
                description:
                  type: string
                  maxLength: 500
              required: [name]
      responses:
        "201":
          description: Knowledge base created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
    get:
      tags: [Knowledge Bases]
      summary: List accessible knowledge bases
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Knowledge bases
          content:
            application/json:
              schema:
                type: object
                properties:
                  knowledgeBases:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeBase"

  /api/knowledge-bases/{kbId}:
    get:
      tags: [Knowledge Bases]
      summary: Get knowledge base details
      security:
        - BearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Knowledge base
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        "404":
          description: Not found
    delete:
      tags: [Knowledge Bases]
      summary: Delete knowledge base and all its documents
      security:
        - BearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
        "403":
          description: Only the owner can delete

  /api/knowledge-bases/{kbId}/members:
    post:
      tags: [Knowledge Bases]
      summary: Add or update a member (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                role:
                  type: string
                  enum: [OWNER, EDITOR, VIEWER]
              required: [userId]
      responses:
        "201":
          description: Member added

  /api/knowledge-bases/{kbId}/graph:
    get:
      tags: [Knowledge Bases]
      summary: Get document similarity graph for visualization
      description: |
        Returns a force-directed graph of documents. Edges represent inter-document similarity.
        Used by the frontend knowledge graph visualization panel.
      security:
        - BearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: threshold
          in: query
          schema:
            type: number
            format: float
            default: 0.7
      responses:
        "200":
          description: Document similarity graph
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeGraphNode"
                  edges:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeGraphEdge"
        "404":
          description: Knowledge base not found

  /api/organizations:
    post:
      tags: [Workspaces]
      summary: Create an organization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required: [name]
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    get:
      tags: [Workspaces]
      summary: List organizations for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Organizations list

  /api/organizations/{orgId}/workspaces:
    post:
      tags: [Workspaces]
      summary: Create a workspace (provisions OpenSearch index)
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Cardiology Team
                retentionDays:
                  type: integer
                  nullable: true
              required: [name]
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    get:
      tags: [Workspaces]
      summary: List workspaces in an organization
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspaces list

  /api/workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      summary: Get workspace details
      security:
        - BearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      tags: [Workspaces]
      summary: Delete workspace and all its documents
      security:
        - BearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted

  /api/admin/audit-logs:
    get:
      tags: [Admin]
      summary: Paginated audit log viewer (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: action
          in: query
          schema:
            type: string
        - name: outcome
          in: query
          schema:
            type: string
            enum: [SUCCESS, DENIED, ERROR]
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  pagination:
                    type: object
        "403":
          description: Admin access required

  /api/admin/audit-logs/export:
    get:
      tags: [Admin]
      summary: Export audit logs as CSV (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: CSV download
          content:
            text/csv:
              schema:
                type: string
        "403":
          description: Admin access required

  /api/users/{userId}/data:
    delete:
      tags: [Admin]
      summary: Right-to-erasure purge of all user data (GDPR)
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Data purged
        "403":
          description: Admin access required

  /api/api-keys:
    post:
      tags: [API Keys]
      summary: Create API key (raw key shown once)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: CI pipeline key
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
              required: [name]
      responses:
        "201":
          description: API key created. rawKey shown exactly once.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiKey"
                  - type: object
                    properties:
                      rawKey:
                        type: string
    get:
      tags: [API Keys]
      summary: List API keys (without raw values)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: API keys list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"

  /api/api-keys/{keyId}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      security:
        - BearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: API key revoked
        "404":
          description: Not found

  /api/health:
    get:
      tags: [Health]
      summary: Health check for all service dependencies
      description: |
        Checks Postgres, OpenSearch, Redis (via embedding-service), embedding-service, rass-engine.
        Returns 200 when all healthy, 503 when any are degraded.
      responses:
        "200":
          description: All healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
